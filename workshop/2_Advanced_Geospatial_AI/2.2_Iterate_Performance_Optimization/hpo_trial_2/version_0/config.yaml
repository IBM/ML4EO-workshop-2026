# lightning.pytorch==2.6.5
seed_everything: 0
trainer:
  accelerator: gpu
  strategy: auto
  devices: auto
  num_nodes: 1
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: /Users/annejones/old-macbook/ibm-repos/ML4EO-workshop-2026/workshop/2_Advanced_Geospatial_AI/2.2_Iterate_Performance_Optimization/hpo_trial_2
      name: ''
      version: 0
      prefix: ''
      flush_logs_every_n_steps: 100
  callbacks:
  - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    init_args:
      logging_interval: epoch
      log_momentum: false
      log_weight_decay: false
  - class_path: lightning.pytorch.callbacks.EarlyStopping
    init_args:
      monitor: val/loss
      min_delta: 0.0
      patience: 20
      verbose: false
      mode: min
      strict: true
      check_finite: true
      log_rank_zero_only: false
  - class_path: terratorch.cli_tools.StateDictAwareModelCheckpoint
    init_args:
      filename: '{epoch}'
      monitor: val/loss
  - class_path: terratorch.cli_tools.StateDictAwareModelCheckpoint
    init_args:
      filename: '{epoch}_state_dict'
      save_weights_only: true
      monitor: val/loss
  fast_dev_run: false
  max_epochs: 2
  max_steps: -1
  overfit_batches: 0.0
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  accumulate_grad_batches: 1
  inference_mode: true
  use_distributed_sampler: true
  detect_anomaly: false
  barebones: false
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: /Users/annejones/old-macbook/ibm-repos/ML4EO-workshop-2026/workshop/2_Advanced_Geospatial_AI/2.2_Iterate_Performance_Optimization/hpo_trial_2
  enable_autolog_hparams: true
model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_args:
      backbone_pretrained: true
      backbone: terramind_v1_base
      decoder_channels: 256
      backbone_modalities:
      - S2L2A
      backbone_merge_method: mean
      backbone_bands:
        S2L2A:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      num_classes: 2
      head_dropout: 0.1
      decoder: FCNDecoder
      decoder_num_convs: 4
      head_channel_list:
      - 256
      necks:
      - name: SelectIndices
        indices:
        - -1
      - name: ReshapeTokensToImage
    model_factory: EncoderDecoderFactory
    loss: dice
    ignore_index: -1
    lr: 0.001
    freeze_backbone: false
    freeze_decoder: false
    freeze_head: false
    plot_on_val: 10
    tiled_inference_parameters:
      h_crop: 256
      h_stride: 32
      w_crop: 256
      w_stride: 32
      average_patches: true
    output_on_inference: prediction
    output_most_probable: true
    tiled_inference_on_testing: false
    tiled_inference_on_validation: false
data:
  class_path: terratorch.datamodules.GenericMultiModalDataModule
  init_args:
    batch_size: 4
    modalities:
    - S2L2A
    means:
      S2L2A:
      - 530.1647429643898
      - 798.664137050334
      - 788.9290127562836
      - 2558.942396063767
      - 1774.444227123873
      - 1101.935018300794
    stds:
      S2L2A:
      - 275.17493711717844
      - 316.9247986961961
      - 539.6066170066144
      - 1625.0164464430488
      - 1136.4428972983876
      - 780.1759822579997
    task: segmentation
    num_classes: 2
    train_data_root:
      S2L2A: ../../data/data_v3/train
    val_data_root:
      S2L2A: ../../data/data_v3/val
    test_data_root:
      S2L2A: ../../data/data_v3/val
    train_label_data_root: ../../data/data_v3/train
    val_label_data_root: ../../data/data_v3/val
    test_label_data_root: ../../data/data_v3/val
    image_grep:
      S2L2A: '*_img.tif'
    label_grep: '*_lab.tif'
    dataset_bands:
      S2L2A:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
    output_bands:
      S2L2A:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
    rgb_modality: RGB
    rgb_indices:
    - 0
    - 1
    - 2
    allow_substring_file_names: true
    skip_file_checks: false
    constant_scale:
      S2L2A: 1.0
    train_transform:
    - class_path: albumentations.RandomCrop
      init_args:
        height: 256
        width: 256
    - class_path: albumentations.pytorch.transforms.ToTensorV2
      init_args:
        transpose_mask: false
        p: 1.0
    val_transform:
    - class_path: albumentations.CenterCrop
      init_args:
        height: 224
        width: 224
    - class_path: albumentations.pytorch.transforms.ToTensorV2
      init_args:
        transpose_mask: false
        p: 1.0
    test_transform:
    - class_path: albumentations.CenterCrop
      init_args:
        height: 224
        width: 224
    - class_path: albumentations.pytorch.transforms.ToTensorV2
      init_args:
        transpose_mask: false
        p: 1.0
    shared_transforms: true
    expand_temporal_dimension: false
    no_data_replace: 0.0
    no_label_replace: -1.0
    reduce_zero_label: false
    drop_last: true
    num_workers: 1
    pin_memory: false
    data_with_sample_dim: false
    allow_missing_modalities: false
    sample_replace: false
    channel_position: -3
    concat_bands: false
    check_stackability: true
out_dtype: int16
deploy_config_file: true
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 1.919008032892341e-06
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.05
    amsgrad: false
    maximize: false
    capturable: false
    differentiable: false
lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    monitor: val/loss
    mode: min
    factor: 0.1
    patience: 10
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 1.0e-08
